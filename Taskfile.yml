# https://taskfile.dev
version: '3'

dotenv:
  - .env.maestro
  - .env

# Global environment variables
env:
  # Java configuration for Maestro
  JAVA_HOME: /opt/homebrew/opt/openjdk@17
  PATH: /opt/homebrew/opt/openjdk@17/bin:{{.PATH}}:{{.HOME}}/.maestro/bin

# Use bash and source nvm for all tasks
set: [pipefail]
shopt: [globstar]

tasks:
  default:
    desc: Show available tasks
    silent: true
    cmd: task --list

  # ====================
  # Development Server
  # ====================
  start:
    desc: Start Expo dev client
    cmd: pnpm run start

  start-prod:
    desc: Start Expo in production mode
    cmd: pnpm run start:prod

  # ====================
  # iOS
  # ====================
  build-ios:
    desc: Build iOS (prebuild native project)
    cmd: pnpm run generate

  run-ios:
    desc: Run on iOS (uses SIMULATOR env from .env)
    cmd: pnpm run ios

  stop-ios:
    desc: Stop iOS Simulator and free resources
    cmds:
      - echo "🛑 Shutting down iOS Simulator..."
      - xcrun simctl shutdown all 2>/dev/null || true
      - killall Simulator 2>/dev/null || true
      - echo "✅ iOS Simulator stopped"

  # ====================
  # Android
  # ====================
  build-android:
    desc: Build Android (prebuild native project)
    cmd: pnpm run generate

  run-android:
    desc: Run on Android device/emulator
    cmd: pnpm run android

  # ====================
  # EAS Cloud Builds
  # ====================
  eas-build-ios:
    desc: Build iOS on EAS (production)
    cmd: pnpm run eas:build:ios

  eas-build-ios-local:
    desc: Build iOS locally via EAS (production)
    cmd: pnpm run eas:build:ios:local

  eas-build-android:
    desc: Build Android on EAS (production)
    cmd: pnpm run eas:build:android

  eas-build-android-local:
    desc: Build Android locally via EAS (production)
    cmd: pnpm run eas:build:android:local

  # ====================
  # Code Quality
  # ====================
  lint:
    desc: Run ESLint
    cmd: pnpm run lint

  lint-fix:
    desc: Run ESLint with auto-fix
    cmd: pnpm exec eslint . --fix

  format:
    desc: Format code with Prettier
    cmd: pnpm run format

  format-check:
    desc: Check if code is formatted (no changes)
    cmd: pnpm exec prettier --check "src/**/*.{ts,tsx,js,jsx}"

  format-all:
    desc: Format code with Prettier then fix with ESLint (recommended)
    cmds:
      - task: format
      - task: lint-fix

  check:
    desc: Run all code quality checks (format check + lint)
    cmds:
      - task: format-check
      - task: lint

  test:
    desc: Run tests
    cmd: pnpm run test

  # ====================
  # Native / Expo
  # ====================
  generate:
    desc: Regenerate native projects (clean)
    cmd: pnpm run generate

  generate-soft:
    desc: Regenerate native projects (incremental)
    cmd: pnpm run generate:soft

  generate-fast:
    desc: Regenerate native projects (skip pod install - fastest)
    cmd: pnpm run generate:fast

  build-metrics:
    desc: Track build time metrics
    cmd: ./scripts/track-build-time.sh {{.CLI_ARGS}}

  ccache-stats:
    desc: Show ccache statistics
    cmd: ccache -s

  ccache-clear:
    desc: Clear ccache
    cmd: ccache -C

  clean-ios-cache:
    desc: Clean iOS build cache (DerivedData and Pods)
    cmds:
      - rm -rf ~/Library/Developer/Xcode/DerivedData
      - rm -rf ios/Pods ios/Podfile.lock ios/build
      - echo "iOS caches cleared. Run 'task generate' to rebuild."

  clean-all-caches:
    desc: Clean all build caches (Metro, iOS, ccache, expo-build-disk-cache)
    cmds:
      - task: clean
      - task: clean-ios-cache
      - task: ccache-clear
      - rm -rf node_modules/.expo-build-disk-cache
      - echo "All caches cleared."

  doctor:
    desc: Run Expo doctor
    cmd: pnpm run doctor

  clean:
    desc: Clean caches
    cmd: pnpm run clean

  # ====================
  # Setup & Environment
  # ====================
  install:
    desc: Install dependencies
    cmd: pnpm install

  setup:
    desc: Full project setup (install + env + Firebase credentials)
    cmds:
      - task: install
      - task: setup-dev

  setup-dev:
    desc: Setup for development (pulls env + creates Firebase placeholders)
    cmds:
      - pnpm run expo:env:pull:dev
      - echo ""
      - echo "✅ Development setup complete!"
      - echo "   Run 'task run-ios' or 'task run-android' to start"

  setup-prod:
    desc: Setup for production (pulls env + creates Firebase placeholders)
    cmd: pnpm run expo:env:pull:prod

  setup-firebase:
    desc: Setup Firebase credentials (placeholders if no real ones exist)
    cmd: pnpm run firebase:setup

  check-prereqs:
    desc: Verify all development prerequisites are installed
    cmd: ./scripts/check-prerequisites.sh

  setup-local-env:
    desc: Setup local-only environment variables (.env.local, .xcode.env.local)
    cmd: ./scripts/setup-local-env.sh

  verify-patches:
    desc: Verify all patches are applied correctly
    cmds:
      - echo "Checking patches..."
      - |
        if grep -q "@unknown default" node_modules/expo-localization/ios/LocalizationModule.swift 2>/dev/null; then
          echo "  expo-localization: PATCHED"
        else
          echo "  expo-localization: NOT patched (run pnpm install)"
        fi
      - echo "Done."

  setup-full:
    desc: Complete setup (install + direnv + local-env + dev + verify-patches)
    cmds:
      - task: install
      - task: setup-direnv
      - task: setup-local-env
      - task: setup-dev
      - task: verify-patches

  setup-volta:
    desc: Setup Volta with Node 20 and pin project versions
    cmds:
      - volta install node@20
      - volta pin node@20
      - echo "✅ Volta setup complete with Node 20"

  setup-node:
    desc: Setup Node.js with Volta (installs and pins Node 20)
    cmds:
      - volta install node@20
      - volta pin node@20
      - echo "✅ Node.js 20 setup complete with Volta"

  setup-direnv:
    desc: Setup direnv for auto-loading environment variables
    cmd: ./scripts/setup-direnv.sh

  env-check:
    desc: Verify environment variables are loaded
    silent: true
    cmds:
      - echo "ENVIRONMENT=$ENVIRONMENT"
      - echo "SIMULATOR=$SIMULATOR"
      - echo "EXPO_PUBLIC_BASE_URL=$EXPO_PUBLIC_BASE_URL"
      - echo ""
      - echo "Firebase credentials:"
      - ls -la credentials/android/ 2>/dev/null || echo "  (no android credentials)"
      - ls -la credentials/ios/ 2>/dev/null || echo "  (no ios credentials)"

  # ====================
  # Storybook
  # ====================
  storybook:
    desc: Start Storybook
    env:
      EXPO_STORYBOOK_ENABLED: 'true'
    cmd: pnpm run storybook

  storybook-generate:
    desc: Generate Storybook stories index
    cmd: pnpm run storybook:generate

  storybook-ios:
    desc: Run Storybook on iOS
    env:
      EXPO_STORYBOOK_ENABLED: 'true'
    cmd: pnpm run ios

  storybook-android:
    desc: Run Storybook on Android
    env:
      EXPO_STORYBOOK_ENABLED: 'true'
    cmd: pnpm run android

  # ====================
  # Utilities
  # ====================
  adb-connect:
    desc: Connect ADB for React Native debugging
    cmd: pnpm run adb:connect

  # ====================
  # MAESTRO E2E TESTING
  # Mobile UI testing with Maestro framework
  # NOTE: PATH and MAESTRO_* variables are loaded from .env.maestro
  # ====================

  # Internal prerequisite tasks (prefixed with _)
  _maestro-ensure-simulator:
    desc: Ensure iOS simulator is booted
    internal: true
    silent: true
    cmds:
      - |
        if xcrun simctl list devices booted | grep -q "{{.SIMULATOR}}"; then
          echo "✓ Simulator '{{.SIMULATOR}}' already running"
        else
          echo "→ Booting simulator '{{.SIMULATOR}}'..."
          xcrun simctl boot "{{.SIMULATOR}}" 2>/dev/null || true
          sleep 3
          echo "✓ Simulator booted"
        fi

  _maestro-ensure-dev-server:
    desc: Ensure Expo dev server is running
    internal: true
    silent: true
    cmds:
      - |
        if lsof -ti:8081 > /dev/null 2>&1; then
          echo "✓ Dev server already running on port 8081"
        else
          echo "→ Starting Expo dev server in background..."
          nohup pnpm run start > /tmp/expo-dev-server.log 2>&1 &
          echo $! > /tmp/expo-dev-server.pid
          echo "→ Waiting for dev server to be ready..."
          timeout=30
          elapsed=0
          while ! lsof -ti:8081 > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "✗ Dev server failed to start after ${timeout}s"
              exit 1
            fi
            sleep 1
            elapsed=$((elapsed + 1))
          done
          sleep 2
          echo "✓ Dev server ready on port 8081"
        fi

  _maestro-ensure-app-installed:
    desc: Ensure app is installed on simulator
    internal: true
    silent: true
    cmds:
      - |
        if xcrun simctl listapps booted | grep -q "{{.MAESTRO_APP_ID}}"; then
          echo "✓ App '{{.MAESTRO_APP_ID}}' is installed"
        else
          echo "✗ App '{{.MAESTRO_APP_ID}}' not found on simulator"
          echo "→ Please run 'task run-ios' first to install the app"
          exit 1
        fi

  maestro-test:
    desc: Run all Maestro tests - uses env from .env.maestro
    deps: [_maestro-ensure-simulator, _maestro-ensure-dev-server, _maestro-ensure-app-installed]
    dir: maestro
    cmds:
      - maestro test flows/auth flows/conversations flows/inbox

  maestro-test-local:
    desc: Run Maestro tests against local backend - localhost port 3000
    deps: [_maestro-ensure-simulator, _maestro-ensure-dev-server, _maestro-ensure-app-installed]
    dir: maestro
    env:
      MAESTRO_BACKEND_URL: http://localhost:3000
    cmds:
      - maestro test flows/auth flows/conversations flows/inbox

  maestro-test-dev:
    desc: Run Maestro tests against dev backend
    deps: [_maestro-ensure-simulator, _maestro-ensure-dev-server, _maestro-ensure-app-installed]
    dir: maestro
    env:
      MAESTRO_BACKEND_URL: https://dev.app.chatscommerce.com
    cmds:
      - maestro test flows/auth/login.yaml

  maestro-test-smoke:
    desc: Run Maestro smoke tests only (single flow for quick validation)
    deps: [_maestro-ensure-simulator, _maestro-ensure-dev-server, _maestro-ensure-app-installed]
    dir: maestro
    cmds:
      - maestro test flows/smoke/critical-paths.yaml

  maestro-test-smoke-dev:
    desc: Run Maestro smoke tests against dev backend
    deps: [_maestro-ensure-simulator, _maestro-ensure-dev-server, _maestro-ensure-app-installed]
    dir: maestro
    env:
      MAESTRO_BACKEND_URL: https://dev.app.chatscommerce.com
    cmds:
      - maestro test flows/smoke/critical-paths.yaml

  maestro-studio:
    desc: Launch Maestro Studio for exploratory testing
    dir: maestro
    cmds:
      - maestro studio

  maestro-doctor:
    desc: Verify Maestro installation
    cmds:
      - maestro doctor

  maestro-setup:
    desc: Install Maestro and verify setup
    cmds:
      - ./scripts/maestro/setup.sh

# https://taskfile.dev
version: '3'

# Include modular task files
includes:
  ios: ./tasks/ios.yml
  android: ./tasks/android.yml
  dev: ./tasks/dev.yml
  quality: ./tasks/quality.yml
  setup: ./tasks/setup.yml
  maestro: ./tasks/maestro.yml
  utils: ./tasks/utils.yml

# Environment configuration
# ============================================================================
# Load environment variables from .env files (in order of precedence)
# - .env.maestro: Maestro E2E test configuration (optional, gitignored)
# - .env: Main environment config (gitignored, use .env.example as template)
# - .env.development: Development defaults (tracked in git)
# - .env.production: Production defaults (tracked in git)
#
# IMPORTANT: Use direnv for automatic environment loading
# Install: brew install direnv
# Setup: echo 'eval "$(direnv hook zsh)"' >> ~/.zshrc
#
# Without direnv, task will still load these files, but JAVA_HOME and
# ANDROID_HOME must be set in .env for Android/Maestro tasks to work.
# ============================================================================
dotenv:
  - .env.maestro # Maestro test config (optional)
  - .env # Main config (required, use .env.example template)
  - .env.{{.ENVIRONMENT}} # Environment-specific defaults

# Global environment - extends from dotenv
# Only add PATH modifications here, all other vars come from .env files
env:
  # Extend PATH with development tools (if JAVA_HOME/ANDROID_HOME are set)
  PATH: '{{if .JAVA_HOME}}{{.JAVA_HOME}}/bin:{{end}}{{if .ANDROID_HOME}}{{.ANDROID_HOME}}/emulator:{{.ANDROID_HOME}}/platform-tools:{{.ANDROID_HOME}}/tools:{{.ANDROID_HOME}}/tools/bin:{{end}}{{.PATH}}{{if .HOME}}:{{.HOME}}/.maestro/bin{{end}}'

# Use bash for all tasks
set: [pipefail]
shopt: [globstar]

tasks:
  default:
    desc: Show available tasks
    silent: true
    cmd: task --list

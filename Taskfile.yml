# https://taskfile.dev
version: '3'

# Include modular task files
includes:
  ios: ./tasks/ios.yml
  android: ./tasks/android.yml
  dev: ./tasks/dev.yml
  quality: ./tasks/quality.yml
  setup: ./tasks/setup.yml
  maestro: ./tasks/maestro.yml
  utils: ./tasks/utils.yml

dotenv:
  - .env.maestro # E2E testing configuration
  - .env # Base configuration from EAS

# Global environment variables
env:
  JAVA_HOME: /opt/homebrew/opt/openjdk@17
  PATH: /opt/homebrew/opt/openjdk@17/bin:{{.PATH}}:{{.HOME}}/.maestro/bin

# Use bash for all tasks
set: [pipefail]
shopt: [globstar]

tasks:
  default:
    desc: Show available tasks
    silent: true
    cmd: task --list

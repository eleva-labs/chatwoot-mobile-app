# Conversation Open Flow
# =====================
# Tests that a user can open a conversation
#
# Prerequisites:
#   - Test user has at least one conversation

appId: ${MAESTRO_APP_ID}
---
# Login using helper
- runFlow: ../../helpers/login-as-agent.yaml

# Wait for conversation list to load
- assertVisible:
    id: 'dashboard_screen'

# Tap on first conversation
- tapOn:
    id: 'conversation_list_item'
    index: 0

# Wait for conversation view to load
- assertVisible:
    id: 'conversation_view'

# Verify message input is visible
- assertVisible:
    id: 'message_input'

# Take screenshot for verification
- takeScreenshot: 'conversation_open'

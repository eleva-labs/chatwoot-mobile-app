# Maestro E2E Testing Tasks
# Mobile UI testing with Maestro framework
# NOTE: MAESTRO_* variables are loaded from .env.maestro
version: '3'

tasks:
  # ==================== Internal Prerequisite Tasks ====================

  _ensure-simulator:
    desc: Ensure iOS simulator is booted
    internal: true
    silent: true
    cmds:
      - |
        if xcrun simctl list devices booted | grep -q "{{.SIMULATOR}}"; then
          echo "✓ Simulator '{{.SIMULATOR}}' already running"
        else
          echo "→ Booting simulator '{{.SIMULATOR}}'..."
          xcrun simctl boot "{{.SIMULATOR}}" 2>/dev/null || true
          sleep 3
          echo "✓ Simulator booted"
        fi

  _ensure-dev-server:
    desc: Ensure Expo dev server is running
    internal: true
    silent: true
    cmds:
      - |
        if lsof -ti:8081 > /dev/null 2>&1; then
          echo "✓ Dev server already running on port 8081"
        else
          echo "→ Starting Expo dev server in background..."
          nohup pnpm run start > /tmp/expo-dev-server.log 2>&1 &
          echo $! > /tmp/expo-dev-server.pid
          echo "→ Waiting for dev server to be ready..."
          timeout=30
          elapsed=0
          while ! lsof -ti:8081 > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "✗ Dev server failed to start after ${timeout}s"
              exit 1
            fi
            sleep 1
            elapsed=$((elapsed + 1))
          done
          sleep 2
          echo "✓ Dev server ready on port 8081"
        fi

  _ensure-app-installed:
    desc: Ensure app is installed on simulator
    internal: true
    silent: true
    cmds:
      - |
        if xcrun simctl listapps booted | grep -q "{{.MAESTRO_APP_ID}}"; then
          echo "✓ App '{{.MAESTRO_APP_ID}}' is installed"
        else
          echo "✗ App '{{.MAESTRO_APP_ID}}' not found on simulator"
          echo "→ Please run 'task ios:run' first to install the app"
          exit 1
        fi

  # ==================== Public Tasks ====================

  test:
    desc: Run all Maestro tests - uses env from .env.maestro
    deps: [_ensure-simulator, _ensure-dev-server, _ensure-app-installed]
    dir: maestro
    cmds:
      - maestro test flows/auth flows/conversations flows/inbox

  test-local:
    desc: Run Maestro tests against local backend - localhost port 3000
    deps: [_ensure-simulator, _ensure-dev-server, _ensure-app-installed]
    dir: maestro
    env:
      MAESTRO_BACKEND_URL: http://localhost:3000
    cmds:
      - maestro test flows/auth flows/conversations flows/inbox

  test-dev:
    desc: Run Maestro tests against dev backend
    deps: [_ensure-simulator, _ensure-dev-server, _ensure-app-installed]
    dir: maestro
    env:
      MAESTRO_BACKEND_URL: https://dev.app.chatscommerce.com
    cmds:
      - maestro test flows/auth/login.yaml

  smoke:
    desc: Run Maestro smoke tests only (single flow for quick validation)
    deps: [_ensure-simulator, _ensure-dev-server, _ensure-app-installed]
    dir: maestro
    cmds:
      - maestro test flows/smoke/critical-paths.yaml

  smoke-dev:
    desc: Run Maestro smoke tests against dev backend
    deps: [_ensure-simulator, _ensure-dev-server, _ensure-app-installed]
    dir: maestro
    env:
      MAESTRO_BACKEND_URL: https://dev.app.chatscommerce.com
    cmds:
      - maestro test flows/smoke/critical-paths.yaml

  studio:
    desc: Launch Maestro Studio for exploratory testing
    dir: maestro
    cmds:
      - maestro studio

  doctor:
    desc: Verify Maestro installation
    cmds:
      - maestro doctor

  setup:
    desc: Install Maestro and verify setup
    cmds:
      - ./scripts/setup/e2e.sh install-java
      - ./scripts/setup/e2e.sh install-maestro
      - ./scripts/setup/e2e.sh install-idb-companion
      - ./scripts/setup/e2e.sh verify-e2e-setup
